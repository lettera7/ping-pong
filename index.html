<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ping Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      user-select: none;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.4em;
      margin-bottom: 12px;
      color: #e0e0e0;
    }

    #scoreboard {
      font-size: 2.5rem;
      letter-spacing: 0.6em;
      margin-bottom: 16px;
      color: #fff;
    }

    canvas {
      border: 2px solid #333;
      border-radius: 4px;
      background: #111;
    }

    #info {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.1em;
      text-align: center;
      line-height: 1.8;
    }

    #message {
      margin-top: 10px;
      font-size: 1rem;
      color: #aaa;
      letter-spacing: 0.15em;
      min-height: 1.4em;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>PING PONG</h1>
  <div id="scoreboard">0 : 0</div>
  <canvas id="canvas" width="800" height="500"></canvas>
  <div id="message">Premi SPAZIO per iniziare</div>
  <div id="info">
    Giocatore 1: W / S &nbsp;|&nbsp; Giocatore 2: ↑ / ↓<br/>
    SPAZIO per pausa/ripresa &nbsp;|&nbsp; R per ricominciare
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreboard = document.getElementById('scoreboard');
    const message = document.getElementById('message');

    const W = canvas.width;
    const H = canvas.height;
    const PAD_W = 12;
    const PAD_H = 80;
    const BALL_R = 8;
    const PAD_SPEED = 6;
    const WIN_SCORE = 7;

    let state = 'idle'; // idle | playing | paused | over

    const game = {
      score: [0, 0],
      ball: { x: 0, y: 0, vx: 0, vy: 0 },
      pads: [
        { y: H / 2 - PAD_H / 2 },
        { y: H / 2 - PAD_H / 2 },
      ],
      keys: {},
    };

    function resetBall(dir = 1) {
      game.ball.x = W / 2;
      game.ball.y = H / 2;
      const speed = 5;
      const angle = (Math.random() * 60 - 30) * Math.PI / 180;
      game.ball.vx = dir * speed * Math.cos(angle);
      game.ball.vy = speed * Math.sin(angle);
    }

    function resetGame() {
      game.score = [0, 0];
      game.pads[0].y = H / 2 - PAD_H / 2;
      game.pads[1].y = H / 2 - PAD_H / 2;
      resetBall();
      updateScoreboard();
    }

    function updateScoreboard() {
      scoreboard.textContent = `${game.score[0]} : ${game.score[1]}`;
    }

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function update() {
      if (state !== 'playing') return;

      const { ball, pads, keys } = game;

      // Move paddles
      if (keys['w'] || keys['W']) pads[0].y -= PAD_SPEED;
      if (keys['s'] || keys['S']) pads[0].y += PAD_SPEED;
      if (keys['ArrowUp'])   pads[1].y -= PAD_SPEED;
      if (keys['ArrowDown']) pads[1].y += PAD_SPEED;

      pads[0].y = clamp(pads[0].y, 0, H - PAD_H);
      pads[1].y = clamp(pads[1].y, 0, H - PAD_H);

      // Move ball
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Top / bottom bounce
      if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.vy *= -1; }
      if (ball.y + BALL_R >= H) { ball.y = H - BALL_R; ball.vy *= -1; }

      // Paddle collision — left
      const pad0x = 20;
      if (ball.vx < 0 &&
          ball.x - BALL_R <= pad0x + PAD_W &&
          ball.x + BALL_R >= pad0x &&
          ball.y >= pads[0].y && ball.y <= pads[0].y + PAD_H) {
        ball.x = pad0x + PAD_W + BALL_R;
        const rel = (ball.y - (pads[0].y + PAD_H / 2)) / (PAD_H / 2);
        const angle = rel * 60 * Math.PI / 180;
        const speed = Math.min(Math.hypot(ball.vx, ball.vy) * 1.05, 18);
        ball.vx =  speed * Math.cos(angle);
        ball.vy =  speed * Math.sin(angle);
      }

      // Paddle collision — right
      const pad1x = W - 20 - PAD_W;
      if (ball.vx > 0 &&
          ball.x + BALL_R >= pad1x &&
          ball.x - BALL_R <= pad1x + PAD_W &&
          ball.y >= pads[1].y && ball.y <= pads[1].y + PAD_H) {
        ball.x = pad1x - BALL_R;
        const rel = (ball.y - (pads[1].y + PAD_H / 2)) / (PAD_H / 2);
        const angle = rel * 60 * Math.PI / 180;
        const speed = Math.min(Math.hypot(ball.vx, ball.vy) * 1.05, 18);
        ball.vx = -speed * Math.cos(angle);
        ball.vy =  speed * Math.sin(angle);
      }

      // Scoring
      if (ball.x < 0) {
        game.score[1]++;
        updateScoreboard();
        if (game.score[1] >= WIN_SCORE) { endGame(1); return; }
        resetBall(1);
      }
      if (ball.x > W) {
        game.score[0]++;
        updateScoreboard();
        if (game.score[0] >= WIN_SCORE) { endGame(0); return; }
        resetBall(-1);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Center line
      ctx.setLineDash([8, 8]);
      ctx.strokeStyle = '#2a2a2a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      // Paddles
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.roundRect(20, game.pads[0].y, PAD_W, PAD_H, 4);
      ctx.fill();

      ctx.beginPath();
      ctx.roundRect(W - 20 - PAD_W, game.pads[1].y, PAD_W, PAD_H, 4);
      ctx.fill();

      // Ball
      ctx.beginPath();
      ctx.arc(game.ball.x, game.ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
    }

    function endGame(winner) {
      state = 'over';
      message.textContent = `Giocatore ${winner + 1} vince! Premi R per ricominciare`;
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    document.addEventListener('keydown', e => {
      game.keys[e.key] = true;

      if (e.key === ' ') {
        e.preventDefault();
        if (state === 'idle') {
          state = 'playing';
          message.textContent = '';
        } else if (state === 'playing') {
          state = 'paused';
          message.textContent = 'IN PAUSA — premi SPAZIO per riprendere';
        } else if (state === 'paused') {
          state = 'playing';
          message.textContent = '';
        }
      }

      if (e.key === 'r' || e.key === 'R') {
        resetGame();
        state = 'idle';
        message.textContent = 'Premi SPAZIO per iniziare';
      }
    });

    document.addEventListener('keyup', e => {
      game.keys[e.key] = false;
    });

    resetGame();
    loop();
  </script>
</body>
</html>
